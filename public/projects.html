<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - PathLynx</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #0F172A; --main-bg: #F8FAFC; --card-bg: #FFFFFF; --primary: #6366F1; --primary-hover: #4F46E5; }
        body { background: var(--main-bg); height: 100vh; overflow: hidden; display: flex; font-family: 'Outfit', sans-serif; color: #1E293B; }
        .sidebar { width: 280px; min-width: 280px; flex-shrink: 0; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 2rem; position: relative; overflow: visible; z-index: 10; }
        .nav-link { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1.25rem; border-radius: 12px; color: #94A3B8; font-weight: 500; transition: all 0.3s ease; text-decoration: none; margin-bottom: 0.5rem; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.08); color: white; }
        .nav-link.active { background: var(--primary); box-shadow: 0 10px 15px -3px rgba(99,102,241,0.3); }
        .main-content { flex-grow: 1; overflow-y: auto; padding: 3rem; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .project-card { background: #fdfdfd; border-radius: 20px; padding: 2rem; border: 1px solid #F1F5F9; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); animation: fadeInUp 0.5s ease forwards; opacity: 0; }
        .project-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px -10px rgba(99,102,241,0.15); }
        .badge { background: #E0E7FF; color: var(--primary); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-bottom: 1rem; display: inline-block; }
        .btn-premium { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.3s ease; }
        .btn-premium:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(99,102,241,0.3); }
        .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        .tab-btn { padding: 0.6rem 1.2rem; border-radius: 10px; border: 2px solid #E2E8F0; background: white; font-weight: 700; font-size: 0.85rem; cursor: pointer; color: #475569; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tab-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
        .new-project-form { background: white; border-radius: 20px; padding: 2rem; border: 1px solid #E2E8F0; margin-bottom: 2rem; display: none; animation: fadeInUp 0.4s ease; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 2px solid #E2E8F0; border-radius: 12px; font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.3s; }
        .form-input:focus { border-color: var(--primary); }
        .status-pill { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-active { background: #D1FAE5; color: #065F46; }
        .status-progress { background: #DBEAFE; color: #1E40AF; }
        .status-idea { background: #FEF3C7; color: #92400E; }
        .antigravity-badge { background: linear-gradient(135deg, #6366F1, #8B5CF6); color: white; padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; display: inline-flex; align-items: center; gap: 0.3rem; }
        .ai-edit-panel { background: linear-gradient(135deg, #1E293B, #0F172A); border-radius: 16px; padding: 1.5rem; border: 1px solid #334155; margin-top: 1rem; }
        .ai-edit-input { width: 100%; padding: 0.7rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid #475569; border-radius: 10px; color: #E2E8F0; font-family: inherit; outline: none; font-size: 0.85rem; }
        .ai-edit-input:focus { border-color: #6366F1; }
        .ai-edit-input::placeholder { color: #64748B; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="position:absolute;width:120px;height:120px;border-radius:50%;background:rgba(99,102,241,0.08);filter:blur(30px);bottom:-20px;left:-20px;animation:orbFloat 15s ease-in-out infinite;pointer-events:none;"></div>
        <div style="margin-bottom: 3.5rem;">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 1rem;">
                <img src="img/Logo.jpeg" alt="PathLynx" style="width: 42px; height: 42px; border-radius: 12px;">
                <span style="font-size: 1.6rem; font-weight: 800; color: white;">PathLynx</span>
            </a>
        </div>
        <nav style="flex-grow: 1;">
            <ul id="roles-nav-container" style="list-style: none; padding: 0;">
                <div class="role-nav-student">
                    <li><a href="dashboard.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i> Overview</a></li>
                    <li><a href="curriculum.html" class="nav-link"><i class="fa-solid fa-book-open"></i> Curriculum</a></li>
                    <li><a href="projects.html" class="nav-link active"><i class="fa-solid fa-code"></i> Projects</a></li>
                    <li><a href="resume.html" class="nav-link"><i class="fa-solid fa-file-lines"></i> Resume AI</a></li>
                </div>
            </ul>
        </nav>
        <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem;">
            <a href="index.html" class="nav-link" style="color: #06B6D4;"><i class="fa-solid fa-globe"></i> Back to Web</a>
            <a href="/logout" class="nav-link" style="color: #FDA4AF;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h1 style="font-size: 2.25rem; font-weight: 800;">Real-World Projects</h1>
                <p style="color: #64748B;">Build your portfolio with industry-grade implementations.</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn-premium" id="ai-suggest-btn" style="background: #10B981;">AI Suggestion <i class="fa-solid fa-wand-magic-sparkles"></i></button>
                <button class="btn-premium" id="new-project-toggle"><i class="fa-solid fa-plus"></i> New Project</button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="all">All Projects</button>
            <button class="tab-btn" data-tab="active">Active</button>
            <button class="tab-btn" data-tab="in-progress">In Progress</button>
            <button class="tab-btn" data-tab="idea">Ideas</button>
        </div>

        <!-- New Project Form -->
        <div class="new-project-form" id="new-project-form">
            <h3 style="margin-bottom: 1.5rem; font-weight: 800;"><i class="fa-solid fa-rocket" style="color: var(--primary);"></i> Create New Project</h3>
            <div class="form-row">
                <input class="form-input" id="np-title" placeholder="Project Title">
                <select class="form-input" id="np-status"><option value="idea">Idea</option><option value="in-progress">In Progress</option><option value="active">Active</option></select>
            </div>
            <input class="form-input" id="np-desc" placeholder="Short description..." style="margin-bottom: 1rem; width: 100%;">
            <input class="form-input" id="np-tech" placeholder="Tech stack (comma separated)" style="margin-bottom: 1.5rem; width: 100%;">
            <div style="display: flex; gap: 1rem;">
                <button class="btn-premium" onclick="addProject()"><i class="fa-solid fa-check"></i> Create</button>
                <button class="btn-premium" style="background: #64748B;" onclick="document.getElementById('new-project-form').style.display='none'">Cancel</button>
            </div>
        </div>

        <!-- Loading -->
        <div id="ai-loading" style="display: none; text-align: center; margin: 2rem 0; padding: 3rem; background: white; border-radius: 16px; border: 1px solid #E2E8F0;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <p style="color: #64748B; font-weight: 600;">Generating personalized project architecture...</p>
        </div>

        <!-- Project Grid -->
        <section class="project-grid" id="project-container"></section>
    </main>

    <!-- Editor Modal -->
    <div id="editor-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div style="width:85%; height:85%; background:#1E1E1E; border-radius:16px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); border:1px solid #333;">
            <div style="background:#252526; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; color:#E2E8F0; border-bottom:1px solid #333;">
                <span id="editor-title" style="font-weight: 700;"><i class="fa-solid fa-code"></i> Antigravity IDE</span>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <select id="editor-theme" onchange="changeTheme(this.value)" style="background:#1E293B; color:white; border:1px solid #475569; padding:0.3rem 0.5rem; border-radius:6px; font-size:0.8rem; outline:none;">
                        <option value="vs-dark">VS Code Dark</option><option value="vs">Light</option><option value="hc-black">High Contrast</option><option value="antigravity">Antigravity</option>
                    </select>
                    <select id="editor-lang" onchange="changeLang(this.value)" style="background:#1E293B; color:white; border:1px solid #475569; padding:0.3rem 0.5rem; border-radius:6px; font-size:0.8rem; outline:none;">
                        <option value="javascript">JavaScript</option><option value="python">Python</option><option value="html">HTML</option><option value="css">CSS</option><option value="typescript">TypeScript</option>
                    </select>
                    <button onclick="aiEditCode()" style="background:linear-gradient(135deg,#6366F1,#8B5CF6); border:none; color:white; padding:0.4rem 0.8rem; border-radius:8px; cursor:pointer; font-weight:700; font-size:0.8rem; display:flex; align-items:center; gap:0.4rem;"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Edit</button>
                    <button onclick="closeEditor()" style="background:transparent; border:none; color:#94A3B8; cursor:pointer; font-size:1.2rem;"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <!-- AI Edit Bar -->
            <div id="ai-edit-bar" style="display:none; background:#0F172A; padding:12px 20px; border-bottom:1px solid #1E293B; display:none;">
                <div style="display:flex; gap:0.8rem; align-items:center;">
                    <input id="ai-edit-prompt" class="ai-edit-input" placeholder="Describe changes... e.g. 'Add error handling' or 'Convert to TypeScript'" style="flex-grow:1;">
                    <button onclick="executeAiEdit()" style="background:#10B981; border:none; color:white; padding:0.5rem 1rem; border-radius:8px; cursor:pointer; font-weight:700; font-size:0.8rem; white-space:nowrap;"><i class="fa-solid fa-bolt"></i> Apply</button>
                    <button onclick="document.getElementById('ai-edit-bar').style.display='none'" style="background:transparent; border:1px solid #475569; color:#94A3B8; padding:0.4rem 0.8rem; border-radius:8px; cursor:pointer; font-size:0.8rem;">Cancel</button>
                </div>
            </div>
            <div id="monaco-editor" style="flex-grow:1;"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script>
    let editorInstance = null;
    let userProjects = JSON.parse(localStorage.getItem('plx-projects') || '[]');
    const defaultProjects = [
        { id: 'd1', title: 'LuxeMart Platform', desc: 'Full-featured commerce app with payment integration and inventory management.', tech: ['React','Node.js','Stripe','MongoDB'], status: 'active', badge: 'E-Commerce', code: '// LuxeMart Platform\nimport express from "express";\n\nconst app = express();\n\n// Product routes\napp.get("/api/products", async (req, res) => {\n  const products = await db.products.findAll();\n  res.json(products);\n});\n\napp.listen(3000);' },
        { id: 'd2', title: 'Connect Hub', desc: 'Real-time communication engine with web-sockets and distributed database systems.', tech: ['Socket.io','Redis','PostgreSQL','Docker'], status: 'in-progress', badge: 'Social Media', code: '// Connect Hub - WebSocket Server\nimport { Server } from "socket.io";\n\nconst io = new Server(3001, {\n  cors: { origin: "*" }\n});\n\nio.on("connection", (socket) => {\n  console.log("User connected:", socket.id);\n  \n  socket.on("message", (data) => {\n    io.emit("message", data);\n  });\n});' }
    ];

    // Monaco setup
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        window.monacoReady = true;
        monaco.editor.defineTheme('antigravity', {
            base: 'vs-dark', inherit: true,
            rules: [{ background: '0F172A' }, { token: 'comment', foreground: '64748B', fontStyle: 'italic' }, { token: 'keyword', foreground: '38BDF8' }, { token: 'string', foreground: '10B981' }],
            colors: { 'editor.background': '#0F172A', 'editor.lineHighlightBackground': '#1E293B' }
        });
    });

    window.changeTheme = (t) => { if (editorInstance && window.monacoReady) monaco.editor.setTheme(t); };
    window.changeLang = (l) => { if (editorInstance && window.monacoReady) monaco.editor.setModelLanguage(editorInstance.getModel(), l); };

    window.openEditor = function(title, code) {
        document.getElementById('editor-modal').style.display = 'flex';
        document.getElementById('editor-title').innerHTML = '<i class="fa-solid fa-code"></i> ' + title;
        document.getElementById('ai-edit-bar').style.display = 'none';
        if (window.monacoReady) {
            if (!editorInstance) {
                editorInstance = monaco.editor.create(document.getElementById('monaco-editor'), {
                    value: code, language: 'javascript', theme: document.getElementById('editor-theme').value,
                    automaticLayout: true, fontSize: 14, fontFamily: "'Fira Code', 'Courier New', monospace",
                    minimap: { enabled: true }, padding: { top: 16 }, smoothScrolling: true, cursorBlinking: 'smooth', cursorSmoothCaretAnimation: 'on'
                });
            } else { editorInstance.setValue(code); }
        }
    };

    window.closeEditor = () => { document.getElementById('editor-modal').style.display = 'none'; };

    window.aiEditCode = () => {
        const bar = document.getElementById('ai-edit-bar');
        bar.style.display = bar.style.display === 'none' ? 'block' : 'none';
        if (bar.style.display === 'block') document.getElementById('ai-edit-prompt').focus();
    };

    window.executeAiEdit = async () => {
        const prompt = document.getElementById('ai-edit-prompt').value.trim();
        if (!prompt || !editorInstance) return;
        const currentCode = editorInstance.getValue();
        const btn = event.target.closest('button');
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Editing...';
        btn.disabled = true;
        try {
            const res = await fetch('/api/ai-edit-code', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: currentCode, instruction: prompt })
            });
            const data = await res.json();
            if (data.code) editorInstance.setValue(data.code);
        } catch (e) {
            // Fallback: add comment
            editorInstance.setValue('// AI Edit: ' + prompt + '\n' + currentCode);
        }
        btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Apply';
        btn.disabled = false;
        document.getElementById('ai-edit-bar').style.display = 'none';
        document.getElementById('ai-edit-prompt').value = '';
    };

    // Render projects
    function getAllProjects() { return [...defaultProjects, ...userProjects]; }

    function renderProjects(filter = 'all') {
        const container = document.getElementById('project-container');
        container.innerHTML = '';
        let projects = getAllProjects();
        if (filter !== 'all') projects = projects.filter(p => p.status === filter);
        if (projects.length === 0) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:4rem; color:#94A3B8;"><i class="fa-solid fa-folder-open" style="font-size:3rem; margin-bottom:1rem; display:block;"></i><p>No projects found. Create one or get AI suggestions!</p></div>';
            return;
        }
        projects.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.style.animationDelay = (i * 0.08) + 's';
            const statusClass = p.status === 'active' ? 'status-active' : p.status === 'in-progress' ? 'status-progress' : 'status-idea';
            const statusText = p.status === 'active' ? 'Ready to Demo' : p.status === 'in-progress' ? 'In Progress' : 'Idea';
            const techHtml = (p.tech || []).map(t => `<span style="background:#F1F5F9; color:#475569; padding:0.2rem 0.5rem; border-radius:6px; font-size:0.7rem; font-weight:600;">${t}</span>`).join('');
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                    <span class="badge">${p.badge || p.tech?.[0] || 'Project'}</span>
                    <span class="status-pill ${statusClass}">${statusText}</span>
                </div>
                <h3 style="font-weight:800; margin-bottom:0.75rem;">${p.title}</h3>
                <p style="font-size:0.9rem; color:#64748B; margin-bottom:1rem; line-height:1.5;">${p.desc || p.description || ''}</p>
                <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.5rem;">${techHtml}</div>
                ${p.antigravityTips ? `<div style="background:#1E293B; color:#E2E8F0; padding:1rem; border-radius:12px; margin-bottom:1.5rem;">
                    <h4 style="color:#38BDF8; font-size:0.8rem; margin-bottom:0.5rem;"><i class="fa-solid fa-rocket"></i> Antigravity Tips</h4>
                    <ul style="padding-left:1.2rem; font-size:0.78rem; line-height:1.5; color:#CBD5E1;">${p.antigravityTips.map(t => '<li style="margin-bottom:0.2rem;">'+t+'</li>').join('')}</ul>
                </div>` : ''}
                <div style="display:flex; gap:0.8rem; align-items:center;">
                    <button onclick="openEditor('${p.title.replace(/'/g,"\\'")}', \`${(p.code || '// ' + p.title + '\\n// Start building...\\n').replace(/`/g,'\\`')}\`)" style="background:var(--primary); color:white; border:none; padding:0.5rem 1rem; border-radius:8px; font-weight:700; cursor:pointer; font-size:0.8rem; display:flex; align-items:center; gap:0.4rem;"><i class="fa-solid fa-code"></i> Edit with Antigravity</button>
                    <button onclick="aiImproveProject('${p.title.replace(/'/g,"\\'")}')" style="background:linear-gradient(135deg,#10B981,#059669); color:white; border:none; padding:0.5rem 1rem; border-radius:8px; font-weight:700; cursor:pointer; font-size:0.8rem; display:flex; align-items:center; gap:0.4rem;"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Improve</button>
                    ${!p.id?.startsWith('d') ? `<button onclick="deleteProject('${p.id}')" style="background:transparent; border:1px solid #FECACA; color:#DC2626; padding:0.4rem 0.8rem; border-radius:8px; cursor:pointer; font-size:0.75rem;"><i class="fa-solid fa-trash"></i></button>` : ''}
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Add project
    window.addProject = () => {
        const title = document.getElementById('np-title').value.trim();
        const desc = document.getElementById('np-desc').value.trim();
        const tech = document.getElementById('np-tech').value.split(',').map(s => s.trim()).filter(Boolean);
        const status = document.getElementById('np-status').value;
        if (!title) return alert('Enter a project title');
        userProjects.push({ id: 'u' + Date.now(), title, desc, tech, status, badge: tech[0] || 'Custom', code: '// ' + title + '\n// Created with PathLynx\n\nconsole.log("🚀 Starting ' + title + '...");\n' });
        localStorage.setItem('plx-projects', JSON.stringify(userProjects));
        document.getElementById('new-project-form').style.display = 'none';
        ['np-title','np-desc','np-tech'].forEach(id => document.getElementById(id).value = '');
        renderProjects();
    };

    window.deleteProject = (id) => {
        userProjects = userProjects.filter(p => p.id !== id);
        localStorage.setItem('plx-projects', JSON.stringify(userProjects));
        renderProjects();
    };

    // AI Improve project
    window.aiImproveProject = async (title) => {
        const proj = getAllProjects().find(p => p.title === title);
        if (!proj) return;
        const code = proj.code || '// ' + title;
        openEditor(title + ' (AI Improving...)', '// ⏳ AI is improving this project...\n// Please wait...');
        try {
            const res = await fetch('/api/ai-edit-code', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, instruction: 'Improve this project code significantly. Add error handling, comments, better architecture, and modern best practices. Make it production-ready.' })
            });
            const data = await res.json();
            if (data.code && editorInstance) editorInstance.setValue(data.code);
            document.getElementById('editor-title').innerHTML = '<i class="fa-solid fa-code"></i> ' + title + ' (AI Improved ✨)';
        } catch(e) {
            if (editorInstance) editorInstance.setValue(code + '\n\n// TODO: Add error handling\n// TODO: Add input validation\n// TODO: Add logging\n// TODO: Add tests');
            document.getElementById('editor-title').innerHTML = '<i class="fa-solid fa-code"></i> ' + title;
        }
    };

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProjects(btn.dataset.tab);
        });
    });

    // New project toggle
    document.getElementById('new-project-toggle').addEventListener('click', () => {
        const form = document.getElementById('new-project-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    });

    // Initial render
    renderProjects();
    </script>
</body>
</html>
